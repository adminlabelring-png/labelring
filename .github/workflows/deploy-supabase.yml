name: Deploy Supabase schema & functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Link project
        run: npx -y supabase@latest link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: npx -y supabase@latest db push

      - name: Deploy edge functions
        run: npx -y supabase@latest functions deploy analyze-label generate-label --project-ref "$SUPABASE_PROJECT_ID"

      - name: Set edge function secrets
        if: ${{ secrets.OPENROUTER_API_KEY != '' }}
        run: npx -y supabase@latest secrets set OPENROUTER_API_KEY="${{ secrets.OPENROUTER_API_KEY }}" --project-ref "$SUPABASE_PROJECT_ID"
