name: Deploy Supabase schema & functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/**"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
      SUPABASE_PROJECT_ID: ${{ secrets.SUPABASE_PROJECT_ID }}
      SUPABASE_DB_PASSWORD: ${{ secrets.SUPABASE_DB_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Link project
        run: supabase link --project-ref "$SUPABASE_PROJECT_ID"

      - name: Push database migrations
        run: supabase db push

      - name: Deploy edge functions
        run: supabase functions deploy analyze-label generate-label --project-ref "$SUPABASE_PROJECT_ID"

      - name: Set edge function secrets
        if: ${{ secrets.LOVABLE_API_KEY != '' }}
        run: supabase secrets set LOVABLE_API_KEY="${{ secrets.LOVABLE_API_KEY }}" --project-ref "$SUPABASE_PROJECT_ID"
