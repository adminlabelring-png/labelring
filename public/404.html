<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Labelring</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // GitHub Pages has no server-side rewrite, so a deep link or a
      // reload on any client-routed path (e.g. /insights/some-slug) 404s
      // before React Router ever loads. GitHub Pages serves this file for
      // any unmatched path -- it encodes the real path into a query string
      // and redirects to the real index.html, which decodes it back
      // (see the matching script in index.html) before the app mounts.
      var pathSegmentsToKeep = 0;
      var l = window.location;
      l.replace(
        l.protocol + "//" + l.hostname + (l.port ? ":" + l.port : "") +
        l.pathname.split("/").slice(0, 1 + pathSegmentsToKeep).join("/") + "/?/" +
        l.pathname.slice(1).split("/").slice(pathSegmentsToKeep).join("/").replace(/&/g, "~and~") +
        (l.search ? "&" + l.search.slice(1).replace(/&/g, "~and~") : "") +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
